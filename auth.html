<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Floy</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 350px; text-align: center; }
        h1 { color: #FF7A1A; letter-spacing: 5px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; }
        button { width: 100%; padding: 12px; background: #FF7A1A; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>FLOY</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button id="loginBtn">SE CONNECTER</button>
        <p id="err" style="color:red; font-size:12px; display:none;"></p>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        document.getElementById('loginBtn').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, e, p);
                window.location.href = "index.html";
            } catch (err) { 
                document.getElementById('err').innerText = "Erreur de connexion";
                document.getElementById('err').style.display = "block";
            }
        };
    </script>
</body>
</html>
