<!DOCTYPE html>
<html>
<head>
    <title>Floy - Connexion</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #messages { list-style-type: none; width: 100%; max-width: 400px; padding: 0; }
        #messages li { padding: 8px; border-bottom: 1px solid #eee; }
        #form { display: flex; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <h1>Bienvenue sur Floy</h1>
    <ul id="messages"></ul>
    <form id="form" action="">
        <input id="input" autocomplete="off" placeholder="Discutez ici..." /><button>Envoyer</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var form = document.getElementById('form');
        var input = document.getElementById('input');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

        socket.on('chat message', function(msg) {
            var item = document.createElement('li');
            item.textContent = msg;
            document.getElementById('messages').appendChild(item);
        });
    </script>
</body>
</html>
