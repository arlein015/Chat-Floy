<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Floy | Discussions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --f-bg: #000000;
            --f-accent: #FF7A1A;
            --f-card: #121212;
            --f-text: #ffffff;
            --f-dim: #8e8e8e;
            --f-border: #262626;
        }

        body { background: var(--f-bg); color: var(--f-text); font-family: sans-serif; margin: 0; padding: 0; }

        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            padding: 10px 15px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid var(--f-border);
        }
        .user-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .my-avatar { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--f-accent); background: #222; }
        .app-logo { font-size: 20px; font-weight: 900; color: var(--f-accent); letter-spacing: 3px; }

        .search-area { padding: 15px; cursor: pointer; }
        .search-bar {
            background: var(--f-card); border-radius: 10px;
            padding: 10px 15px; display: flex; align-items: center; gap: 10px;
            color: var(--f-dim); border: 1px solid #222;
        }

        .inbox-list { display: flex; flex-direction: column; }
        .chat-item {
            display: flex; align-items: center; gap: 15px;
            padding: 12px 15px; cursor: pointer; border-bottom: 0.5px solid var(--f-border);
        }
        .u-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; background: #222; }
        .u-name { font-weight: 600; font-size: 16px; display: block; }
        .u-msg { font-size: 14px; color: var(--f-dim); }

        #floy-loader {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="floy-loader">
        <i class="fas fa-circle-notch fa-spin" style="color:var(--f-accent); font-size:30px;"></i>
    </div>

    <header style="display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: #000; border-bottom: 1px solid #1a1a1a;">
    <div onclick="window.location.href='profile-edit.html'">
        <img id="my-avatar" src="https://via.placeholder.com/40" style="width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #FF7A1A;">
    </div>
    
    <h1 style="font-size: 20px; font-weight: 900; color: #FF7A1A; letter-spacing: 4px; margin: 0;">FLOY</h1>

    <div onclick="window.location.href='menu.html'" style="cursor: pointer; display: flex; align-items: center;">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 6H20M4 12H20M4 18H20" stroke="#FF7A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
</header>

    <div class="search-area" onclick="window.location.href='search.html'">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <span>Rechercher un ami sur Floy...</span>
        </div>
    </div>

    <main class="inbox-list" id="inbox-render"></main>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, query, onSnapshot, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const inbox = document.getElementById('inbox-render');

        // FORCE L'ARRET DU LOADER IMMEDIATEMENT
        document.getElementById('floy-loader').style.display = 'none';

        auth.onAuthStateChanged(async (user) => {
            if(!user) {
                window.location.href = "auth.html";
            } else {
                // Charger mon avatar
                try {
                    const mySnap = await getDoc(doc(db, "Utilisateurs", user.uid));
                    if(mySnap.exists()) {
                        document.getElementById('my-avatar').src = mySnap.data().avatarUrl || 'https://via.placeholder.com/40';
                    }
                } catch(e) { console.error("Erreur Profil:", e); }
                
                loadUsers(user.uid);
            }
        });

        function loadUsers(myUid) {
            // Utilisation de "Utilisateurs" comme dans ta console Firebase
            const q = query(collection(db, "Utilisateurs"), orderBy("username", "asc"));
            
            onSnapshot(q, (snap) => {
                inbox.innerHTML = "";
                snap.forEach(docSnap => {
                    const u = docSnap.data();
                    if(docSnap.id === myUid) return;

                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.onclick = () => window.location.href = `chat.html?id=${docSnap.id}`;

                    div.innerHTML = `
                        <img src="${u.avatarUrl || 'https://via.placeholder.com/150'}" class="u-img">
                        <div style="flex:1">
                            <span class="u-name">${u.username}</span>
                            <div class="u-msg">Démarrer une discussion</div>
                        </div>
                        <i class="fas fa-chevron-right" style="color:#222"></i>
                    `;
                    inbox.appendChild(div);
                });
            }, (error) => {
                console.error("Erreur Firebase:", error);
                // Si l'erreur permission-denied s'affiche ici, 
                // c'est qu'il faut vraiment publier les règles sur Firebase.
            });
        }
    </script>
</body>
</html>
