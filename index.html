<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Floy</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .chat-item { padding: 15px 20px; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #333; }
        #loader { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="loader"><b style="color:#FF7A1A;">CHARGEMENT FLOY...</b></div>
    <header><h2>Chats</h2></header>
    <div id="inbox"></div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        auth.onAuthStateChanged(user => {
            if(!user) window.location.href = "auth.html";
            else {
                document.getElementById('loader').style.display = 'none';
                // Note : Si ça ne s'affiche pas, clique sur le lien d'INDEX dans ta console !
                const q = query(collection(db, "users"), orderBy("username", "asc"));
                onSnapshot(q, (snap) => {
                    const ui = document.getElementById('inbox');
                    ui.innerHTML = "";
                    snap.forEach(doc => {
                        const u = doc.data();
                        if(doc.id === user.uid) return;
                        ui.innerHTML += `
                            <div class="chat-item" onclick="window.location.href='chat.html?id=${doc.id}'">
                                <img src="${u.avatarUrl || 'https://via.placeholder.com/50'}" class="avatar">
                                <div><b>${u.username}</b><br><small style="color:gray">Cliquer pour discuter</small></div>
                            </div>`;
                    });
                });
            }
        });
    </script>
</body>
</html>
