<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discussion | Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --f-bg: #000000;
            --f-accent: #FF7A1A; /* Orange Floy */
            --f-bubble-me: #FF7A1A;
            --f-bubble-them: #1c1c1e;
            --f-text-me: #000000;
            --f-text-them: #ffffff;
        }

        body { background: var(--f-bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }

        /* --- HEADER --- */
        header {
            padding: 15px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10;
        }
        .back-btn { color: var(--f-accent); font-size: 20px; cursor: pointer; }
        #chat-user-name { font-weight: bold; font-size: 17px; }

        /* --- ZONE DE CHAT --- */
        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px 15px;
            display: flex; flex-direction: column; gap: 10px;
            background: #000;
        }

        /* --- STYLE DES BULLES --- */
        .message {
            max-width: 75%; padding: 10px 15px; border-radius: 18px;
            font-size: 15px; line-height: 1.4; position: relative;
            word-wrap: break-word;
        }

        /* Message envoyé par moi (à droite) */
        .message.me {
            align-self: flex-end;
            background: var(--f-bubble-me);
            color: var(--f-text-me);
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        /* Message reçu (à gauche) */
        .message.them {
            align-self: flex-start;
            background: var(--f-bubble-them);
            color: var(--f-text-them);
            border-bottom-left-radius: 4px;
        }

        /* --- BARRE D'ENVOI --- */
        footer {
            padding: 10px 15px 25px 15px; background: #000;
            border-top: 1px solid #222; display: flex; gap: 10px;
        }
        #msg-input {
            flex: 1; background: #1a1a1a; border: 1px solid #333;
            padding: 12px 18px; border-radius: 25px; color: #fff; outline: none;
        }
        #msg-input:focus { border-color: var(--f-accent); }
        .send-btn {
            background: var(--f-accent); border: none; width: 45px; height: 45px;
            border-radius: 50%; color: #000; cursor: pointer; font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-arrow-left back-btn" onclick="window.location.href='index.html'"></i>
        <span id="chat-user-name">Chargement...</span>
    </header>

    <main id="chat-window"></main>

    <footer>
        <input type="text" id="msg-input" placeholder="Message Floy..." autocomplete="off">
        <button class="send-btn" id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </footer>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const win = document.getElementById('chat-window');
        const input = document.getElementById('msg-input');
        const btn = document.getElementById('send-btn');
        const nameDisplay = document.getElementById('chat-user-name');
        
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('id');

        auth.onAuthStateChanged(async (user) => {
            if(!user) window.location.href = "auth.html";
            if(!targetId) window.location.href = "index.html";

            // 1. Récupérer le nom de l'autre (depuis Utilisateurs)
            const snap = await getDoc(doc(db, "Utilisateurs", targetId));
            if(snap.exists()) nameDisplay.innerText = snap.data().username;

            // 2. ID unique pour la discussion
            const roomId = [user.uid, targetId].sort().join("_");

            // 3. Écouter les messages en temps réel
            const q = query(collection(db, "chats", roomId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                win.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.senderId === user.uid;
                    const div = document.createElement('div');
                    div.className = `message ${isMe ? 'me' : 'them'}`;
                    div.innerText = m.text;
                    win.appendChild(div);
                });
                win.scrollTop = win.scrollHeight;
            });

            // 4. Envoyer un message
            const send = async () => {
                if(!input.value.trim()) return;
                const text = input.value;
                input.value = "";
                await addDoc(collection(db, "chats", roomId, "messages"), {
                    senderId: user.uid,
                    text: text,
                    timestamp: serverTimestamp()
                });
            };

            btn.onclick = send;
            input.onkeypress = (e) => { if(e.key === "Enter") send(); };
        });
    </script>
</body>
</html>
