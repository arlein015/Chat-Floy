<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy | Messagerie</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="floy-container">
        <nav class="side-menu">
            <div class="logo">F</div>
            <i class='bx bx-message-square-detail active'></i>
            <i class='bx bx-search'></i>
            <i class='bx bx-bell'></i>
            <div class="user-avatar" id="open-profile">
                </div>
        </nav>

        <section class="chat-list">
            <header>
                <h2>Discussions</h2>
                <button id="new-chat"><i class='bx bx-edit'></i></button>
            </header>
            <div class="search-bar">
                <input type="text" placeholder="Rechercher un ami...">
            </div>
            <div class="conversations-container" id="conv-list">
                </div>
        </section>

        <main class="chat-window">
            <header class="chat-header">
                <div class="chat-user-info">
                    <span class="status-dot online"></span>
                    <h3 id="current-chat-name">Sélectionnez un ami</h3>
                </div>
                <div class="chat-actions">
                    <i class='bx bx-video'></i>
                    <i class='bx bx-info-circle'></i>
                </div>
            </header>

            <div class="messages-display" id="messages-container">
                <div class="welcome-msg">Commencez à discuter sur Floy !</div>
            </div>

            <footer class="chat-input-area">
                <button class="attach-btn"><i class='bx bx-plus'></i></button>
                <input type="text" id="main-input" placeholder="Votre message...">
                <button id="send-btn"><i class='bx bxs-send'></i></button>
            </footer>
        </main>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="message-engine.js"></script>
</body>
</html>
