<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Floy | Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        .chat-window { display: flex; flex-direction: column; height: 100vh; }
        #messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: #121212; }
        input { flex: 1; padding: 15px; border-radius: 10px; border: none; background: #1e1e1e; color: white; outline: none; }
        button { background: #FF7920; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .msg-sent { align-self: flex-end; background: #FF7920; color: #000; padding: 10px 15px; border-radius: 15px 15px 0 15px; max-width: 70%; font-weight: 600; }
    </style>
</head>
<body>
    <div class="chat-window">
        <header style="padding: 20px; border-bottom: 1px solid #1e1e1e; color: #FF7920; font-weight: 900;">FLOY CHAT</header>
        
        <div id="messages-container">
            </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Écris ton message ici...">
            <button id="send-btn">ENVOYER</button>
        </div>
    </div>

    <script type="module">
        const btn = document.getElementById('send-btn');
        const input = document.getElementById('user-input');
        const container = document.getElementById('messages-container');

        btn.onclick = () => {
            if (input.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = 'msg-sent';
                div.innerText = input.value;
                container.appendChild(div);
                input.value = "";
                container.scrollTop = container.scrollHeight;
            }
        };
    </script>
</body>
</html>
