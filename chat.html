<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Floy | Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">F</div>
            <div class="icon active">💬</div>
            <div class="icon">👤</div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <h2>FLOY CHAT</h2>
            </header>

            <div id="messages-container">
                <div class="msg received">Bienvenue sur Floy. Design en cours...</div>
            </div>

            <div class="input-bar">
                <input type="text" id="user-input" placeholder="Discutez ici...">
                <button id="send-btn">Envoyer</button>
            </div>
        </main>
    </div>

</body>
</html>
