<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat | Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --f-bg: #000000;
            --f-accent: #FF7A1A; /* Ton orange Floy */
            --f-bubble-me: #FF7A1A;
            --f-bubble-them: #262626;
            --f-text: #ffffff;
            --f-dim: #8e8e8e;
        }

        body { background: var(--f-bg); color: var(--f-text); font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 15px;
            border-bottom: 1px solid #222; z-index: 100;
        }
        .back-btn { font-size: 20px; color: var(--f-accent); cursor: pointer; margin-right: 15px; }
        .target-name { font-weight: 700; font-size: 17px; }

        /* --- ZONE DE MESSAGES --- */
        #chat-window {
            height: 100vh; overflow-y: auto; padding: 80px 15px 100px 15px;
            display: flex; flex-direction: column; gap: 8px;
        }

        .m-row { display: flex; width: 100%; }
        .m-row.me { justify-content: flex-end; }
        .m-row.them { justify-content: flex-start; }

        .bubble {
            max-width: 75%; padding: 10px 14px; border-radius: 18px;
            font-size: 15px; line-height: 1.4; position: relative;
        }
        .me .bubble { background: var(--f-bubble-me); color: #000; border-bottom-right-radius: 4px; font-weight: 500; }
        .them .bubble { background: var(--f-bubble-them); color: #fff; border-bottom-left-radius: 4px; }

        /* --- INPUT --- */
        footer {
            position: fixed; bottom: 0; width: 100%; padding: 15px;
            background: #000; border-top: 1px solid #222;
            display: flex; gap: 10px; align-items: center;
        }
        #msg-input {
            flex: 1; background: #1a1a1a; border: 1px solid #333;
            padding: 12px 15px; border-radius: 25px; color: #fff; outline: none;
        }
        #msg-input:focus { border-color: var(--f-accent); }
        .send-btn {
            background: var(--f-accent); border: none; width: 45px; height: 45px;
            border-radius: 50%; color: #000; cursor: pointer; font-size: 18px;
        }

        #loader { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="loader"><b style="color:var(--f-accent)">OUVERTURE DU CHAT...</b></div>

    <header>
        <i class="fas fa-arrow-left back-btn" onclick="window.location.href='index.html'"></i>
        <span class="target-name" id="display-name">Chargement...</span>
    </header>

    <main id="chat-window"></main>

    <footer>
        <input type="text" id="msg-input" placeholder="Message Floy..." autocomplete="off">
        <button class="send-btn" id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </footer>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const win = document.getElementById('chat-window');
        const input = document.getElementById('msg-input');
        const btn = document.getElementById('send-btn');
        
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('id');

        auth.onAuthStateChanged(async (user) => {
            if(!user) window.location.href = "auth.html";
            else if(!targetId) window.location.href = "index.html";
            else {
                document.getElementById('loader').style.display = 'none';
                
                // 1. Charger le nom du destinataire
                const snap = await getDoc(doc(db, "users", targetId));
                if(snap.exists()) document.getElementById('display-name').innerText = snap.data().username;

                // 2. Créer l'ID de la discussion (Unique pour vous deux)
                const roomId = [user.uid, targetId].sort().join("_");

                // 3. Écouter les messages
                const q = query(collection(db, "rooms", roomId, "messages"), orderBy("timestamp", "asc"));
                onSnapshot(q, (snap) => {
                    win.innerHTML = "";
                    snap.forEach(d => {
                        const m = d.data();
                        const isMe = m.senderId === user.uid;
                        win.innerHTML += `
                            <div class="m-row ${isMe ? 'me' : 'them'}">
                                <div class="bubble">${m.text}</div>
                            </div>`;
                    });
                    win.scrollTop = win.scrollHeight;
                });

                // 4. Envoyer
                const send = async () => {
                    if(!input.value.trim()) return;
                    const text = input.value;
                    input.value = "";
                    await addDoc(collection(db, "rooms", roomId, "messages"), {
                        senderId: user.uid,
                        text: text,
                        timestamp: serverTimestamp()
                    });
                };
                btn.onclick = send;
                input.onkeypress = (e) => { if(e.key === "Enter") send(); };
            }
        });
    </script>
</body>
</html>
