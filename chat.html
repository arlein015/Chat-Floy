<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Floy | Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-f">F</div>
            <i class='bx bxs-chat' style="color: var(--floy-orange); font-size: 24px;"></i>
        </aside>

        <main class="chat-main">
            <div id="messages-container"></div>

            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Message..." autocomplete="off">
                <button class="send-btn" id="send-trigger">
                    <i class='bx bxs-send'></i>
                </button>
            </div>
        </main>
    </div>

    <script type="module" src="message-engine.js"></script>
</body>
</html>
