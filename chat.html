<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discussion | Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --f-bg: #000000;
            --f-accent: #FF7A1A;
            --f-bubble-me: #FF7A1A;
            --f-bubble-them: #1c1c1e;
            --f-text-me: #000000;
            --f-text-them: #ffffff;
            --f-dim: #636366;
        }

        body { background: var(--f-bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- HEADER --- */
        header {
            padding: 10px 15px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 10;
        }
        .back-btn { color: var(--f-accent); font-size: 18px; cursor: pointer; padding: 5px; }
        #chat-user-name { font-weight: 700; font-size: 16px; letter-spacing: 0.5px; }

        /* --- ZONE DE CHAT --- */
        #chat-window {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            background: #000;
        }

        /* --- STRUCTURE DU MESSAGE --- */
        .msg-container { display: flex; flex-direction: column; max-width: 75%; }
        .msg-container.me { align-self: flex-end; align-items: flex-end; }
        .msg-container.them { align-self: flex-start; align-items: flex-start; }

        .bubble {
            padding: 10px 14px; border-radius: 18px;
            font-size: 15px; line-height: 1.4; word-wrap: break-word;
        }
        .me .bubble { background: var(--f-bubble-me); color: var(--f-text-me); border-bottom-right-radius: 4px; font-weight: 500; }
        .them .bubble { background: var(--f-bubble-them); color: var(--f-text-them); border-bottom-left-radius: 4px; }

        /* --- L'HEURE --- */
        .timestamp {
            font-size: 10px; color: var(--f-dim); margin-top: 4px; font-weight: 500;
            text-transform: uppercase;
        }

        /* --- BARRE D'ENVOI --- */
        footer {
            padding: 10px 15px 30px 15px; background: #000;
            border-top: 1px solid #1a1a1a; display: flex; gap: 10px; align-items: center;
        }
        #msg-input {
            flex: 1; background: #121212; border: 1px solid #222;
            padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; font-size: 15px;
        }
        #msg-input:focus { border-color: var(--f-accent); }
        .send-btn {
            background: var(--f-accent); border: none; width: 42px; height: 42px;
            border-radius: 50%; color: #000; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-chevron-left back-btn" onclick="window.location.href='index.html'"></i>
        <span id="chat-user-name">...</span>
    </header>

    <main id="chat-window"></main>

    <footer>
        <input type="text" id="msg-input" placeholder="Message Floy..." autocomplete="off">
        <button class="send-btn" id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </footer>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const win = document.getElementById('chat-window');
        const input = document.getElementById('msg-input');
        const btn = document.getElementById('send-btn');
        const nameDisplay = document.getElementById('chat-user-name');
        
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('id');

        // Fonction pour formater l'heure (ex: 14:30)
        function formatTime(timestamp) {
            if(!timestamp) return "...";
            const date = timestamp.toDate();
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        auth.onAuthStateChanged(async (user) => {
            if(!user) window.location.href = "auth.html";
            if(!targetId) window.location.href = "index.html";

            // Charger le nom de l'autre depuis ta collection "Utilisateurs"
            const snap = await getDoc(doc(db, "Utilisateurs", targetId));
            if(snap.exists()) nameDisplay.innerText = snap.data().username;

            const roomId = [user.uid, targetId].sort().join("_");

            const q = query(collection(db, "chats", roomId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                win.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.senderId === user.uid;
                    
                    const container = document.createElement('div');
                    container.className = `msg-container ${isMe ? 'me' : 'them'}`;
                    
                    container.innerHTML = `
                        <div class="bubble">${m.text}</div>
                        <div class="timestamp">${formatTime(m.timestamp)}</div>
                    `;
                    
                    win.appendChild(container);
                });
                win.scrollTop = win.scrollHeight;
            });

            const send = async () => {
                if(!input.value.trim()) return;
                const text = input.value;
                input.value = "";
                await addDoc(collection(db, "chats", roomId, "messages"), {
                    senderId: user.uid,
                    text: text,
                    timestamp: serverTimestamp()
                });
            };

            btn.onclick = send;
            input.onkeypress = (e) => { if(e.key === "Enter") send(); };
        });
    </script>
</body>
</html>
