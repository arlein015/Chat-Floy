<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy | Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-f">F</div>
            <i class='bx bxs-chat active'></i>
            <i class='bx bxs-user-circle'></i>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <h2>Salon FLOY</h2>
            </header>

            <div id="messages-container">
                </div>

            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Écris ici..." autocomplete="off">
                <button class="send-btn" id="send-trigger">
                    <i class='bx bxs-send'></i>
                </button>
            </div>
        </main>
    </div>

    <script src="message-engine.js"></script>
</body>
</html>
