<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy | Connexion</title>
    <link rel="stylesheet" href="style.css"> <style>
        .auth-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }
        .logo-text {
            color: #FF7920;
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        .auth-card {
            width: 100%;
            max-width: 350px;
            padding: 20px;
            text-align: center;
        }
        h2 { margin-bottom: 30px; font-weight: 600; }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #A0A0A0;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }
        input {
            width: 100%;
            background: #121212;
            border: 1px solid #1E1E1E;
            padding: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #FF7920; }
        .btn-primary {
            width: 100%;
            background: #FF7920;
            color: #000000;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .error-msg {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 15px;
            display: none; /* Caché par défaut */
        }
        .link-footer {
            margin-top: 30px;
            color: #A0A0A0;
            font-size: 14px;
        }
        .link-footer a { color: #FF7920; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-text">FLOY</div>
        
        <div class="auth-card">
            <h2>Se connecter</h2>

            <form id="login-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="ton@email.com" required>
                </div>

                <div class="input-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" id="login-btn">Connexion</button>
                <div id="error-display" class="error-msg"></div>
            </form>

            <div class="link-footer">
                Pas encore de compte ? <a href="signin.html">S'inscrire</a>
            </div>
        </div>
    </div>

    <script type="module" src="auth-controller.js"></script>
</body>
</html>
