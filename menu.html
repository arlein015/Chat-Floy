<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu | Floy</title>
    <style>
        :root {
            --f-bg: #000000;
            --f-accent: #FF7A1A;
            --f-card: #121212;
            --f-text: #ffffff;
            --f-dim: #8e8e8e;
            --f-border: #1c1c1e;
        }

        body { 
            background: var(--f-bg); color: var(--f-text); 
            font-family: -apple-system, sans-serif; margin: 0; padding: 0; 
        }

        header {
            padding: 15px 20px; display: flex; align-items: center; gap: 20px;
            border-bottom: 1px solid var(--f-border);
        }

        .back-btn-svg { cursor: pointer; display: flex; align-items: center; }

        /* --- PROFIL --- */
        .profile-hero { padding: 35px 20px; text-align: center; }
        .menu-avatar {
            width: 95px; height: 95px; border-radius: 50%;
            border: 3px solid var(--f-accent); margin-bottom: 12px;
            object-fit: cover;
        }
        .user-name { font-size: 22px; font-weight: 800; display: block; }
        
        /* --- LISTE --- */
        .menu-list { padding: 10px 15px; }
        .menu-item {
            display: flex; align-items: center; gap: 18px;
            padding: 16px; border-radius: 14px;
            margin-bottom: 8px; cursor: pointer;
            transition: background 0.2s;
        }
        .menu-item:active { background: #111; }
        .menu-item span { font-size: 16px; font-weight: 500; flex: 1; }
        
        .icon-box {
            width: 32px; height: 32px; display: flex; 
            align-items: center; justify-content: center;
        }

        .logout { color: #ff3b30; margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <div class="back-btn-svg" onclick="window.history.back()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="#FF7A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <span style="font-weight: 800; font-size: 19px; letter-spacing: 1px;">RÉGLAGES</span>
    </header>

    <div class="profile-hero">
        <img id="user-img" src="https://via.placeholder.com/100" class="menu-avatar">
        <span class="user-name" id="user-name">Chargement...</span>
    </div>

    <div class="menu-list">
        <div class="menu-item" onclick="window.location.href='profile-edit.html'">
            <div class="icon-box">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FF7A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <span>Mon Profil</span>
        </div>

        <div class="menu-item">
            <div class="icon-box">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FF7A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8C6 12 4 14 4 14H20C20 14 18 12 18 8Z"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </div>
            <span>Notifications</span>
        </div>

        <div class="menu-item">
            <div class="icon-box">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FF7A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <span>Sécurité</span>
        </div>

        <div class="menu-item logout" id="btn-logout">
            <div class="icon-box">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </div>
            <span>Déconnexion</span>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = "auth.html";
            } else {
                const snap = await getDoc(doc(db, "Utilisateurs", user.uid));
                if (snap.exists()) {
                    document.getElementById('user-name').innerText = snap.data().username;
                    document.getElementById('user-img').src = snap.data().avatarUrl || 'https://via.placeholder.com/100';
                }
            }
        });

        document.getElementById('btn-logout').onclick = () => {
            if(confirm("Déconnexion de Floy ?")) {
                signOut(auth).then(() => { window.location.href = "auth.html"; });
            }
        };
    </script>
</body>
</html>
