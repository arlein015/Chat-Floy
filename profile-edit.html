<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy | Modifier Profil</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --f-bg: #000000;
            --f-accent: #FF7A1A;
            --f-card: #121212;
            --f-text: #ffffff;
            --f-border: #1c1c1e;
            --safe-top: env(safe-area-inset-top);
        }

        body { 
            background: var(--f-bg); color: var(--f-text); 
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; 
        }

        /* HEADER */
        header {
            padding: calc(15px + var(--safe-top)) 20px 15px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--f-border);
        }
        .back-btn { font-size: 20px; color: var(--f-accent); cursor: pointer; }
        .save-btn { 
            background: var(--f-accent); color: #000; border: none;
            padding: 8px 25px; border-radius: 20px; font-weight: 800; cursor: pointer;
        }

        /* AVATAR SECTION */
        .avatar-container {
            display: flex; flex-direction: column; align-items: center; padding: 40px 0;
        }
        .avatar-wrapper {
            position: relative; width: 140px; height: 140px;
            border-radius: 50%; border: 3px solid var(--f-accent); padding: 5px;
        }
        #profile-img-preview {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #111;
        }
        .upload-icon {
            position: absolute; bottom: 5px; right: 5px;
            background: var(--f-accent); width: 35px; height: 35px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--f-bg); color: #000; cursor: pointer;
        }

        /* FORM */
        .form-section { padding: 0 25px; }
        .input-group { margin-bottom: 25px; }
        label { color: #555; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 10px; }
        input, textarea {
            width: 100%; background: var(--f-card); border: 1px solid var(--f-border);
            border-radius: 15px; padding: 15px; color: #fff; font-size: 16px; font-family: inherit;
        }
        input:focus { border-color: var(--f-accent); outline: none; }

        .progress-text { color: var(--f-accent); font-size: 12px; margin-top: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="window.history.back()"><i class="fa-solid fa-arrow-left"></i></div>
        <div style="font-weight: 800; letter-spacing: 2px;">MODIFIER PROFIL</div>
        <button class="save-btn" id="save-all">OK</button>
    </header>

    <div class="avatar-container">
        <div class="avatar-wrapper">
            <img id="profile-img-preview" src="https://via.placeholder.com/150">
            <label for="file-input" class="upload-icon">
                <i class="fa-solid fa-camera"></i>
            </label>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
        </div>
        <div id="upload-status" class="progress-text"></div>
    </div>

    <div class="form-section">
        <div class="input-group">
            <label>Nom d'utilisateur public</label>
            <input type="text" id="username-input" placeholder="Ton pseudo...">
        </div>
        <div class="input-group">
            <label>Ma Note (Statut 24h)</label>
            <textarea id="note-input" rows="2" placeholder="Quoi de neuf ?"></textarea>
        </div>
    </div>

    <script type="module">
        import { db, auth, storage } from './firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const fileInput = document.getElementById('file-input');
        const imgPreview = document.getElementById('profile-img-preview');
        const usernameInput = document.getElementById('username-input');
        const noteInput = document.getElementById('note-input');
        const statusText = document.getElementById('upload-status');
        const saveBtn = document.getElementById('save-all');

        let selectedFile = null;

        // 1. Vérifier la connexion et charger les données existantes
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            try {
                const userDoc = await getDoc(doc(db, "Utilisateurs", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    usernameInput.value = data.username || "";
                    noteInput.value = data.statusNote || "";
                    imgPreview.src = data.avatarUrl || 'https://via.placeholder.com/150';
                }
            } catch (err) {
                console.error("Erreur de chargement :", err);
            }
        });

        // 2. Aperçu immédiat de l'image sélectionnée
        fileInput.onchange = e => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                imgPreview.src = URL.createObjectURL(selectedFile);
            }
        };

        // 3. Sauvegarder tout
        saveBtn.onclick = async () => {
            const user = auth.currentUser;
            if (!user) return;

            saveBtn.disabled = true;
            saveBtn.innerText = "Attente...";

            try {
                let finalAvatarUrl = imgPreview.src;

                // Si une nouvelle image a été choisie, on l'upload d'abord
                if (selectedFile) {
                    const storageRef = ref(storage, `avatars/${user.uid}`);
                    const uploadTask = uploadBytesResumable(storageRef, selectedFile);

                    await new Promise((resolve, reject) => {
                        uploadTask.on('state_changed', 
                            (snap) => {
                                const prog = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
                                statusText.innerText = `Envoi : ${prog}%`;
                            },
                            (err) => reject(err),
                            async () => {
                                finalAvatarUrl = await getDownloadURL(uploadTask.snapshot.ref);
                                resolve();
                            }
                        );
                    });
                }

                // Mise à jour de Firestore
                await updateDoc(doc(db, "Utilisateurs", user.uid), {
                    username: usernameInput.value,
                    statusNote: noteInput.value,
                    noteTimestamp: Date.now(), // Pour la règle des 24h
                    avatarUrl: finalAvatarUrl
                });

                alert("Profil mis à jour !");
                window.location.href = "index.html";

            } catch (error) {
                console.error("Erreur sauvegarde :", error);
                alert("Erreur de permission ou connexion. Vérifie tes règles Firebase.");
                saveBtn.disabled = false;
                saveBtn.innerText = "OK";
            }
        };
    </script>
</body>
</html>
