<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Édition Profil | Floy</title>
    <style>
        :root {
            --f-bg: #000;
            --f-accent: #FF7A1A;
            --f-card: #121212;
            --f-text: #fff;
            --f-border: #1c1c1e;
        }

        body { background: var(--f-bg); color: var(--f-text); font-family: -apple-system, sans-serif; margin: 0; }

        header {
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--f-border); background: rgba(0,0,0,0.9);
            position: sticky; top: 0; z-index: 100;
        }

        .btn-save { background: var(--f-accent); color: #000; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        .content { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 30px; }

        /* --- AVATAR --- */
        .avatar-container { position: relative; width: 130px; height: 130px; }
        #preview-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--f-accent); }
        .upload-badge {
            position: absolute; bottom: 5px; right: 5px; background: var(--f-accent);
            width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 3px solid #000; cursor: pointer;
        }

        /* --- INPUTS --- */
        .field { width: 100%; max-width: 400px; }
        .field label { display: block; color: #555; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; font-weight: 800; }
        .field input {
            width: 100%; background: var(--f-card); border: 1px solid var(--f-border);
            padding: 15px; border-radius: 15px; color: #fff; font-size: 16px; outline: none;
        }
        .field input:focus { border-color: var(--f-accent); }

        #progression { font-size: 12px; color: var(--f-accent); margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <header>
        <div onclick="window.location.href='index.html'" style="cursor:pointer">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FF7A1A" stroke-width="2.5"><path d="M19 12H5M5 12L12 19M5 12L12 5"/></svg>
        </div>
        <span style="font-weight: 900; letter-spacing: 1px;">MODIFIER PROFIL</span>
        <button class="btn-save" id="save-all">OK</button>
    </header>

    <div class="content">
        <div class="avatar-container">
            <img id="preview-img" src="https://via.placeholder.com/130">
            <label for="file-up" class="upload-badge">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </label>
            <input type="file" id="file-up" hidden accept="image/*">
        </div>
        <div id="progression">Envoi de la photo... 0%</div>

        <div class="field">
            <label>Nom d'utilisateur public</label>
            <input type="text" id="name-in" placeholder="Ex: FloyUser">
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { MediaHandler } from './media-handler.js';

        const img = document.getElementById('preview-img');
        const inputName = document.getElementById('name-in');
        const fileUp = document.getElementById('file-up');
        const progText = document.getElementById('progression');
        let currentUrl = "";

        auth.onAuthStateChanged(async (user) => {
            if(!user) return;
            // Charger les données (Collection "Utilisateurs")
            const snap = await getDoc(doc(db, "Utilisateurs", user.uid));
            if(snap.exists()) {
                inputName.value = snap.data().username || "";
                img.src = snap.data().avatarUrl || "";
                currentUrl = snap.data().avatarUrl;
            }
        });

        // Upload permanent
        fileUp.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            progText.style.display = "block";
            try {
                const url = await MediaHandler.uploadImage(file, "avatars", (p) => {
                    progText.innerText = `Envoi : ${Math.round(p)}%`;
                });
                currentUrl = url;
                img.src = url;
                progText.innerText = "Photo prête !";
            } catch(err) { alert("Erreur upload"); }
        };

        // Sauvegarde permanente
        document.getElementById('save-all').onclick = async () => {
            const user = auth.currentUser;
            if(!user) return;
            
            await updateDoc(doc(db, "Utilisateurs", user.uid), {
                username: inputName.value,
                avatarUrl: currentUrl
            });
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
