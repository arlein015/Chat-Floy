<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le Profil | Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .back-btn { position: absolute; top: 20px; left: 20px; color: #FF7A1A; font-size: 20px; cursor: pointer; }
        .avatar-edit { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #FF7A1A; margin-top: 40px; }
        .upload-icon { margin-top: -30px; margin-left: 80px; background: #FF7A1A; color: #000; padding: 8px; border-radius: 50%; cursor: pointer; position: relative; }
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 30px; }
        .save-btn { width: 100%; padding: 15px; background: #FF7A1A; border: none; border-radius: 8px; color: #000; font-weight: 900; margin-top: 20px; cursor: pointer; }
        #progress { width: 100%; background: #222; height: 5px; margin-top: 10px; display: none; }
        #bar { width: 0%; height: 100%; background: #FF7A1A; }
    </style>
</head>
<body>

    <i class="fas fa-arrow-left back-btn" onclick="window.location.href='index.html'"></i>
    <h2>Modifier le Profil</h2>

    <div style="position: relative; display: inline-block;">
        <img id="preview" src="https://via.placeholder.com/120" class="avatar-edit">
        <div class="upload-icon" onclick="document.getElementById('file-in').click()">
            <i class="fas fa-camera"></i>
        </div>
    </div>
    <input type="file" id="file-in" style="display:none;" accept="image/*">
    <div id="progress"><div id="bar"></div></div>

    <input type="text" id="new-username" placeholder="Nouveau pseudo">
    <button class="save-btn" id="save-btn">ENREGISTRER LES MODIFICATIONS</button>

    <script type="module">
        import { db, auth, storage } from './firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const preview = document.getElementById('preview');
        const fileIn = document.getElementById('file-in');
        const userIn = document.getElementById('new-username');
        const saveBtn = document.getElementById('save-btn');

        auth.onAuthStateChanged(async (user) => {
            if(!user) window.location.href = "auth.html";
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()){
                userIn.value = snap.data().username;
                preview.src = snap.data().avatarUrl || 'https://via.placeholder.com/120';
            }
        });

        saveBtn.onclick = async () => {
            const user = auth.currentUser;
            const file = fileIn.files[0];
            saveBtn.disabled = true;
            saveBtn.innerText = "Mise à jour...";

            let finalUrl = preview.src;

            // 1. Si une nouvelle image est choisie
            if(file) {
                const sRef = ref(storage, `avatars/${user.uid}`);
                const task = uploadBytesResumable(sRef, file);
                document.getElementById('progress').style.display = 'block';

                await new Promise((resolve, reject) => {
                    task.on('state_changed', 
                        (s) => { document.getElementById('bar').style.width = (s.bytesTransferred/s.totalBytes)*100 + '%'; },
                        reject, 
                        async () => {
                            finalUrl = await getDownloadURL(task.snapshot.ref);
                            resolve();
                        }
                    );
                });
            }

            // 2. Mise à jour Firestore
            await updateDoc(doc(db, "users", user.uid), {
                username: userIn.value,
                avatarUrl: finalUrl
            });

            alert("Profil mis à jour !");
            window.location.href = "index.html";
        };

        fileIn.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => { preview.src = reader.result; };
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
