<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modifier Profil | Floy</title>
    <style>
        :root {
            --f-bg: #000;
            --f-accent: #FF7A1A;
            --f-card: #121212;
            --f-text: #fff;
            --f-border: #1c1c1e;
        }

        body { background: var(--f-bg); color: var(--f-text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }

        header {
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--f-border); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }

        .save-btn { color: var(--f-accent); font-weight: bold; cursor: pointer; border: none; background: none; font-size: 16px; }

        .container { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 25px; }

        /* --- AVATAR EDIT --- */
        .avatar-wrapper { position: relative; width: 120px; height: 120px; }
        #profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--f-accent); }
        .camera-icon {
            position: absolute; bottom: 5px; right: 5px; background: var(--f-accent);
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 3px solid #000; cursor: pointer;
        }

        /* --- FORMULAIRE --- */
        .input-group { width: 100%; }
        label { display: block; color: #666; font-size: 12px; margin-bottom: 8px; margin-left: 5px; text-transform: uppercase; font-weight: 600; }
        input {
            width: 100%; background: var(--f-card); border: 1px solid var(--f-border);
            padding: 15px; border-radius: 12px; color: #fff; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--f-accent); }

        #upload-status { font-size: 13px; color: var(--f-accent); margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <header>
        <div onclick="window.location.href='index.html'" style="cursor:pointer">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FF7A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M5 12L12 19M5 12L12 5"/></svg>
        </div>
        <span style="font-weight: 800;">MON PROFIL</span>
        <button class="save-btn" id="save-profile">ENREGISTRER</button>
    </header>

    <div class="container">
        <div class="avatar-wrapper">
            <img id="profile-img" src="https://via.placeholder.com/120">
            <label for="file-input" class="camera-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </label>
            <input type="file" id="file-input" hidden accept="image/*">
        </div>
        <div id="upload-status">Téléchargement : 0%</div>

        <div class="input-group">
            <label>Nom d'utilisateur</label>
            <input type="text" id="username-input" placeholder="Ton pseudo...">
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { MediaHandler } from './media-handler.js';

        const profileImg = document.getElementById('profile-img');
        const fileInput = document.getElementById('file-input');
        const usernameInput = document.getElementById('username-input');
        const saveBtn = document.getElementById('save-profile');
        const status = document.getElementById('upload-status');

        let newAvatarUrl = null;

        auth.onAuthStateChanged(async (user) => {
            if (!user) window.location.href = "auth.html";

            // Charger les données actuelles (U majuscule pour Utilisateurs)
            const snap = await getDoc(doc(db, "Utilisateurs", user.uid));
            if (snap.exists()) {
                const data = snap.data();
                usernameInput.value = data.username || "";
                profileImg.src = data.avatarUrl || "https://via.placeholder.com/120";
                newAvatarUrl = data.avatarUrl;
            }
        });

        // Gestion de la photo
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.style.display = "block";
            try {
                const url = await MediaHandler.uploadImage(file, "avatars", (prog) => {
                    status.innerText = `Téléchargement : ${Math.round(prog)}%`;
                });
                newAvatarUrl = url;
                profileImg.src = url;
                status.innerText = "Image prête !";
            } catch (err) {
                alert("Erreur d'envoi de l'image.");
            }
        };

        // Enregistrer les modifications
        saveBtn.onclick = async () => {
            const user = auth.currentUser;
            const newName = usernameInput.value.trim();

            if (!newName) return alert("Le nom est obligatoire");

            saveBtn.disabled = true;
            saveBtn.innerText = "SÉCURISATION...";

            try {
                await updateDoc(doc(db, "Utilisateurs", user.uid), {
                    username: newName,
                    avatarUrl: newAvatarUrl
                });
                alert("Profil mis à jour !");
                window.location.href = "index.html";
            } catch (err) {
                console.error(err);
                alert("Erreur lors de la mise à jour.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "ENREGISTRER";
            }
        };
    </script>
</body>
</html>
